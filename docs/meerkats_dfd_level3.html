  <text x="1398" y="464" font-size="8" fill="#475569">1. workspace_id on every row — multi-tenant isolation</text>

  <text x="1398" y="503" font-size="8" fill="#475569">4. COD revenue optimistic; restatement via order_lifecycle</text>

  <text x="1398" y="568" font-size="8" fill="#475569">9. daily_metrics refreshed nightly (raw&#x2192;canonical 4h cadence)</text>
