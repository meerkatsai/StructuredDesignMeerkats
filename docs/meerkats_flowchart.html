  <!-- Lane 8: Agent & Console            y=1450 h=160 -->

  <rect x="0" y="20"   width="130" height="110" fill="#E2E8F0"/>

  <!-- =========================================================
       LANE 1: AD PLATFORMS
  ========================================================= -->

  <!-- START terminal -->
  <rect x="160" y="48" width="140" height="36" rx="18" fill="#0F172A" stroke="none"/>

  <!-- Meta Ads box -->

  <!-- WhatsApp/CRM -->
  <rect x="760" y="40" width="160" height="52" rx="5" fill="#fff" stroke="#0F172A" stroke-width="1.5"/>

  <text x="840" y="72" text-anchor="middle" font-size="8" fill="#64748B">Inbound lead message</text>
  <text x="840" y="85" text-anchor="middle" font-size="8" fill="#64748B">No click ID available</text>

  <!-- Arrows -->
  <line x1="300" y1="66" x2="358" y2="66" stroke="#0F172A" stroke-width="1.2" marker-end="url(#ak)"/>
  <line x1="520" y1="66" x2="558" y2="66" stroke="#0F172A" stroke-width="1.2" marker-end="url(#ak)"/>
  <line x1="720" y1="66" x2="758" y2="66" stroke="#0F172A" stroke-width="1.2" marker-end="url(#ak)"/>

  <!-- =========================================================
       LANE 2: CLICK CAPTURE
  ========================================================= -->

  <!-- Link Service process -->
  <rect x="360" y="155" width="200" height="52" rx="5" fill="#FFF7ED" stroke="#C2410C" stroke-width="2"/>
  <text x="460" y="174" text-anchor="middle" font-size="10" font-weight="700" fill="#C2410C">Link Service</text>
  <text x="460" y="187" text-anchor="middle" font-size="8" fill="#475569">Intercepts click URL</text>
  <text x="460" y="198" text-anchor="middle" font-size="8" fill="#475569">before landing page</text>

  <!-- mk_cid minting -->
  <rect x="610" y="155" width="200" height="52" rx="5" fill="#FFF7ED" stroke="#C2410C" stroke-width="2"/>
  <text x="710" y="174" text-anchor="middle" font-size="10" font-weight="700" fill="#C2410C">Mint mk_cid</text>
  <text x="710" y="187" text-anchor="middle" font-size="8" fill="#475569">Generate UUID mk_cid</text>
  <text x="710" y="198" text-anchor="middle" font-size="8" fill="#475569">Store gclid/fbclid server-side</text>

  <!-- write click_ids -->
  <rect x="860" y="155" width="200" height="52" rx="5" fill="#FFF7ED" stroke="#C2410C" stroke-width="2"/>
  <text x="960" y="174" text-anchor="middle" font-size="10" font-weight="700" fill="#C2410C">Write click_ids row</text>
  <text x="960" y="187" text-anchor="middle" font-size="8" fill="#475569">mk_cid + platform_click_id</text>
  <text x="960" y="198" text-anchor="middle" font-size="8" fill="#475569">+ utm_* + workspace_id</text>

  <!-- Create anon visitor -->
  <rect x="1110" y="155" width="200" height="52" rx="5" fill="#FFF7ED" stroke="#C2410C" stroke-width="2"/>
  <text x="1210" y="174" text-anchor="middle" font-size="10" font-weight="700" fill="#C2410C">Create anon_visitor</text>
  <text x="1210" y="187" text-anchor="middle" font-size="8" fill="#475569">PostHog distinct_id</text>
  <text x="1210" y="198" text-anchor="middle" font-size="8" fill="#475569">Link mk_cid to anon row</text>

  <polygon points="1380,206 1440,181 1500,206 1440,231" fill="#FFF7ED" stroke="#C2410C" stroke-width="1.5"/>

  <text x="1440" y="212" text-anchor="middle" font-size="8" font-weight="700" fill="#C2410C">ID?</text>

  <!-- Yes → stored -->
  <rect x="1530" y="169" width="160" height="38" rx="4" fill="#F0FDF4" stroke="#15803D" stroke-width="1.2"/>
  <text x="1610" y="184" text-anchor="middle" font-size="8" font-weight="700" fill="#15803D">YES: Path A eligible</text>
  <text x="1610" y="197" text-anchor="middle" font-size="8" fill="#475569">confidence 1.0 possible</text>

  <!-- No → UTM only -->
  <rect x="1530" y="215" width="160" height="38" rx="4" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.2"/>
  <text x="1610" y="230" text-anchor="middle" font-size="8" font-weight="700" fill="#DC2626">NO: UTM only</text>
  <text x="1610" y="243" text-anchor="middle" font-size="8" fill="#475569">Path B max (0.7)</text>

  <!-- WA/CRM direct to identity -->
  <text x="840" y="172" text-anchor="middle" font-size="8" fill="#64748B" font-style="italic">bypasses click capture</text>
  <path d="M 840,92 Q 840,290 960,290" stroke="#64748B" stroke-width="1" stroke-dasharray="4 3" fill="none" marker-end="url(#asl)"/>

  <!-- Arrows lane 2 -->
  <path d="M 440,92 Q 440,155 460,155" stroke="#92400E" stroke-width="1.5" fill="none" marker-end="url(#ay)"/>
  <path d="M 640,92 Q 640,155 460,155" stroke="#92400E" stroke-width="1.5" fill="none" marker-end="url(#ay)"/>
  <line x1="560" y1="181" x2="608" y2="181" stroke="#C2410C" stroke-width="1.5" marker-end="url(#ao)"/>

  <line x1="1060" y1="181" x2="1108" y2="181" stroke="#C2410C" stroke-width="1.5" marker-end="url(#ao)"/>

  ========================================================= -->

  <!-- Decision: PII at checkout? -->
  <polygon points="200,380 280,340 360,380 280,420" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1.5"/>
  <text x="280" y="373" text-anchor="middle" font-size="8" font-weight="700" fill="#1D4ED8">Email /</text>

  <text x="280" y="397" text-anchor="middle" font-size="8" font-weight="700" fill="#1D4ED8">captured?</text>

  <!-- No: stays anon -->
  <rect x="160" y="425" width="240" height="36" rx="4" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1"/>

  <text x="185" y="440" font-size="8" fill="#64748B" font-weight="700">NO</text>

  <!-- Yes: PII Hasher -->
  <rect x="420" y="350" width="180" height="52" rx="5" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1.5"/>
  <text x="510" y="369" text-anchor="middle" font-size="10" font-weight="700" fill="#1D4ED8">PII Hasher</text>
  <text x="510" y="382" text-anchor="middle" font-size="8" fill="#475569">SHA-256 email + phone</text>
  <text x="510" y="394" text-anchor="middle" font-size="8" fill="#475569">Never stores raw PII</text>
  <text x="363" y="363" font-size="8" fill="#15803D" font-weight="700">YES</text>

  <!-- Customer upsert -->

  <text x="750" y="382" text-anchor="middle" font-size="8" fill="#475569">Match email_hash or create</text>
  <text x="750" y="394" text-anchor="middle" font-size="8" fill="#475569">new customer row</text>

  <!-- Write identity_edge -->
  <rect x="900" y="350" width="200" height="52" rx="5" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1.5"/>

  <text x="1000" y="382" text-anchor="middle" font-size="8" fill="#475569">anon_id &#x2194; customer_id</text>
  <text x="1000" y="394" text-anchor="middle" font-size="8" fill="#475569">confidence + stitch_method</text>

  <line x1="600" y1="376" x2="648" y2="376" stroke="#1D4ED8" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="850" y1="376" x2="898" y2="376" stroke="#1D4ED8" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="1100" y1="376" x2="1148" y2="376" stroke="#1D4ED8" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- =========================================================
       LANE 4: SESSION & EVENT
  ========================================================= -->

  <!-- Receive PostHog event -->

  <text x="280" y="500" text-anchor="middle" font-size="8" fill="#475569">PostHog SDK / webhook</text>
  <text x="280" y="512" text-anchor="middle" font-size="8" fill="#475569">Validate + dedup</text>

  <!-- Session Bucketer -->
  <rect x="440" y="468" width="200" height="52" rx="5" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>

  <text x="800" y="500" text-anchor="middle" font-size="8" fill="#475569">raw_event &#x2192; canonical_stage</text>
  <text x="800" y="512" text-anchor="middle" font-size="8" fill="#475569">via workspace_stage_map</text>

  <!-- Event enricher -->
  <rect x="960" y="468" width="200" height="52" rx="5" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>

  <text x="1060" y="500" text-anchor="middle" font-size="8" fill="#475569">Add customer_id from edge</text>
  <text x="1060" y="512" text-anchor="middle" font-size="8" fill="#475569">Add mk_cid to session</text>

  <!-- Write sessions/events -->
  <rect x="1220" y="468" width="200" height="52" rx="5" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="1320" y="487" text-anchor="middle" font-size="10" font-weight="700" fill="#7C3AED">Write sessions + events</text>
  <text x="1320" y="500" text-anchor="middle" font-size="8" fill="#475569">D4: sessions · events</text>
  <text x="1320" y="512" text-anchor="middle" font-size="8" fill="#475569">page_views (partitioned)</text>

  <!-- Decision: order_placed event? -->
  <polygon points="1490,520 1570,494 1650,520 1570,546" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="1570" y="514" text-anchor="middle" font-size="8" font-weight="700" fill="#7C3AED">order_</text>
  <text x="1570" y="526" text-anchor="middle" font-size="8" font-weight="700" fill="#7C3AED">placed?</text>

  <!-- Yes arrow down to commerce -->
  <text x="1662" y="518" font-size="8" fill="#15803D" font-weight="700">YES</text>

  <!-- Arrows lane 4 -->
  <path d="M 1210,207 Q 1210,460 280,460 Q 280,468 280,468" stroke="#7C3AED" stroke-width="1.2" fill="none" marker-end="url(#ap)"/>
  <line x1="380" y1="494" x2="438" y2="494" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#ap)"/>
  <line x1="640" y1="494" x2="698" y2="494" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#ap)"/>
  <line x1="900" y1="494" x2="958" y2="494" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#ap)"/>
  <line x1="1160" y1="494" x2="1218" y2="494" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#ap)"/>
  <line x1="1420" y1="494" x2="1488" y2="520" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#ap)"/>
  <line x1="1652" y1="520" x2="1700" y2="650" stroke="#15803D" stroke-width="1.5" marker-end="url(#ag)"/>

  <text x="1500" y="574" font-size="8" fill="#64748B">NO: continue events</text>

  <!-- =========================================================
       LANE 5: COMMERCE
  ========================================================= -->

  <!-- Webhook receiver -->
  <rect x="680" y="638" width="200" height="52" rx="5" fill="#F0FDF4" stroke="#15803D" stroke-width="1.5"/>
  <text x="780" y="657" text-anchor="middle" font-size="10" font-weight="700" fill="#15803D">Webhook Receiver</text>
  <text x="780" y="670" text-anchor="middle" font-size="8" fill="#475569">Shopify / CRM webhook</text>
