async function decompress(b64gz) {
  const bin = atob(b64gz);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  document.getElementById('bar').style.width = '30%';
  const ds = new DecompressionStream('gzip');
  const writer = ds.writable.getWriter();
  writer.write(bytes);
  writer.close();
  document.getElementById('bar').style.width = '60%';
  const chunks = [];
  const reader = ds.readable.getReader();
  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    chunks.push(value);
  }
  const total = chunks.reduce((a,c) => a + c.length, 0);
  const out = new Uint8Array(total);
  let offset = 0;
  for (const c of chunks) { out.set(c, offset); offset += c.length; }
  document.getElementById('bar').style.width = '90%';
  return new TextDecoder().decode(out);
}
(async () => {
  try {
    const html = await decompress(DATA);

    setTimeout(() => {
      document.open();
      document.write(html);
      document.close();
    }, 200);
  } catch(e) {
    document.getElementById('loading').innerHTML = '<div style="color:#DC2626">Failed to load: ' + e.message + '</div>';
  }
})();
