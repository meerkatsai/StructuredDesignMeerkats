  <text x="46" y="626" font-size="10" fill="#0F172A"><tspan font-weight="700">Ad click</tspan> hits Meerkats Link Service before redirect. Server mints <tspan font-weight="600">mk_cid</tspan>, stores gclid/fbclid server-side. Fixes Safari ITP (no 7-day cookie expiry). anonymous_visitor row created. click_ids row written with platform + UTM.</text>
